<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Terrain Sandbox</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
	<div id="canvas"></div>
	<div id="leftJoystickContainerDynamic"></div>
	<div id="rightJoystickContainerDynamic"></div>
	<div id="blocker">
		<div id="instructions">
			<p id="instructionText">
				Click or tap to start terrain sandbox
			</p>

				KEYBOARD/MOUSE CONTROLS:<br/>

				Turbo: Move + Shift<br/>          
				Elevation: QZ<br/>				
				Look: MOUSE<br/>
				<br/>
				TOUCH CONTROLS:<br/>
				Left pad: Move<br/>
				Right pad: Look<br/>
			</p>
		</div>
	</div>
	<div id="build-info"></div>
	<div id="landingPageButton" class="button">Back</div>
	<script type="module" src="main.ts"></script>
	<script type="module" src="./src/global.ts"></script>
	<script type="module" src="./src/01-quadtree/main.ts"></script>
